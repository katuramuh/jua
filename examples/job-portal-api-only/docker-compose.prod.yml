###############################################
# Job Portal -- Production (API Only)
###############################################
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#
# Prerequisites:
#   - .env file with production values
#   - DNS records pointing to this server
#   - Reverse proxy (Caddy/Nginx) in front

version: "3.9"

networks:
  jobportal:
    name: jobportal-network
    driver: bridge

volumes:
  pg_data:
  redis_data:
  minio_data:

services:
  # -- PostgreSQL ------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: job_portal
      POSTGRES_USER: ${POSTGRES_USER:-jua}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - pg_data:/var/lib/postgresql/data
    expose:
      - "5432"
    networks:
      - jobportal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jua} -d job_portal"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # -- Redis -----------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    networks:
      - jobportal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -- MinIO (S3-compatible storage) -----------
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${STORAGE_ACCESS_KEY:?Set STORAGE_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_KEY:?Set STORAGE_SECRET_KEY}
    volumes:
      - minio_data:/data
    expose:
      - "9000"
      - "9001"
    networks:
      - jobportal
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -- Go API ----------------------------------
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-jua}:${POSTGRES_PASSWORD}@postgres:5432/job_portal?sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      STORAGE_ENDPOINT: minio:9000
      STORAGE_USE_SSL: "false"
      API_PORT: "8080"
    ports:
      - "8080:8080"
    networks:
      - jobportal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/v3/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
