###############################################
# Job Portal — Production (Triple + Vite)
###############################################
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#
# Key difference from Next.js version:
#   Vite builds to static files (dist/) which are copied into the Go API
#   container. The API serves them directly — no separate Node.js containers
#   needed. This results in fewer containers and simpler deployment.
#
# Prerequisites:
#   - .env file with production values
#   - DNS records pointing to this server

version: "3.9"

networks:
  jobportal:
    name: jobportal-network
    driver: bridge

volumes:
  pg_data:
  redis_data:
  minio_data:

services:
  # ── PostgreSQL ────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: job_portal
      POSTGRES_USER: ${POSTGRES_USER:-jua}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - pg_data:/var/lib/postgresql/data
    expose:
      - "5432"
    networks:
      - jobportal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jua} -d job_portal"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Redis ─────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    networks:
      - jobportal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO (S3-compatible storage) ─────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${STORAGE_ACCESS_KEY:?Set STORAGE_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_KEY:?Set STORAGE_SECRET_KEY}
    volumes:
      - minio_data:/data
    expose:
      - "9000"
      - "9001"
    networks:
      - jobportal
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Go API + Static Frontend ──────────────
  # Single container serves the API AND both frontends.
  # The Dockerfile builds Vite apps, copies dist/ into the
  # Go binary's embedded filesystem or a static serve path.
  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:?Set VITE_API_URL}
        VITE_APP_NAME: ${VITE_APP_NAME:-Job Portal}
        VITE_ADMIN_API_URL: ${VITE_ADMIN_API_URL:?Set VITE_ADMIN_API_URL}
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-jua}:${POSTGRES_PASSWORD}@postgres:5432/job_portal?sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      STORAGE_ENDPOINT: minio:9000
      STORAGE_USE_SSL: "false"
      API_PORT: "8080"
      # Tell the API to serve static files
      SERVE_WEB: /app/web-dist
      SERVE_ADMIN: /app/admin-dist
    expose:
      - "8080"
    networks:
      - jobportal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/v3/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Reverse Proxy (Caddy) ────────────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - jobportal
    depends_on:
      - api

volumes:
  caddy_data:
  caddy_config:

# ─────────────────────────────────────────────
# Dockerfile (referenced above) builds like this:
#
#   # Stage 1: Build Vite apps
#   FROM node:18-alpine AS frontend
#   WORKDIR /build
#   COPY pnpm-lock.yaml pnpm-workspace.yaml package.json ./
#   COPY packages/ packages/
#   COPY apps/web/ apps/web/
#   COPY apps/admin/ apps/admin/
#   RUN corepack enable && pnpm install --frozen-lockfile
#   ARG VITE_API_URL VITE_APP_NAME VITE_ADMIN_API_URL
#   RUN pnpm --filter web build && pnpm --filter admin build
#
#   # Stage 2: Build Go API
#   FROM golang:1.21-alpine AS backend
#   WORKDIR /build
#   COPY apps/api/ .
#   RUN go build -o server cmd/server/main.go
#
#   # Stage 3: Final image
#   FROM alpine:3.19
#   COPY --from=backend /build/server /app/server
#   COPY --from=frontend /build/apps/web/dist /app/web-dist
#   COPY --from=frontend /build/apps/admin/dist /app/admin-dist
#   EXPOSE 8080
#   CMD ["/app/server"]
# ─────────────────────────────────────────────
