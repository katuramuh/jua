name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Run tests
        run: go test ./... -v -race -count=1

      - name: Check test coverage
        run: go test ./... -coverprofile=coverage.out -covermode=atomic

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.out
          fail_ci_if_error: false

      - name: Check for old branding
        run: |
          # Exclude legitimate third-party package paths that happen to use MUKE-coder
          if grep -r "MUKE-coder\|JB Web\|gritframework\|desishub" . \
               --exclude-dir=".git" \
               --include="*.go" --include="*.ts" --include="*.tsx" \
               --include="*.md" --include="*.json" | \
             grep -v "MUKE-coder/sentinel\|MUKE-coder/pulse\|MUKE-coder/gorm-studio\|MUKE-coder/gin-docs"; then
            echo "ERROR: old branding strings found — remove them before merging"
            exit 1
          fi
          echo "Brand check passed."

  build-matrix:
    name: Cross-platform build
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64.exe
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: go build -ldflags="-s -w" -o jua-${{ matrix.suffix }} ./cmd/jua

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jua-${{ matrix.suffix }}
          path: jua-${{ matrix.suffix }}
          retention-days: 7
